name: Deploy · automatic (main)

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build and deploy
        uses: ./.github/actions/deploy-pages
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          site-url: https://${{ github.repository_owner }}.github.io/whereis-app
